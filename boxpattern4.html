<!DOCTYPE html>
<html>
<head>
<style>
  .outer-box {
    border: 2px solid darkblue;
    width: 450px;
    height: 300px;
    padding: 10px;
    box-sizing: border-box;
  }
  table {
    border-collapse: separate;
    border-spacing: 15px; /* Creates the space between the boxes */
    width: 100%;
    height: 100%;
  }
  td {
    width: 33.33%;
    height: 33.33%;
    text-align: center;
    font-family: sans-serif;
    font-size: 18px;
    font-weight: bold;
  }
  /* Specific styling for the colored boxes */
  .colored-box {
    border: 2px solid darkblue;
    color: white; /* Default text color for dark backgrounds */
  }
  .red-box {
    background-color: red;
  }
  .green-box {
    background-color: green;
  }
  .blue-box {
    background-color: blue;
  }
  .orange-box {
    background-color: orange;
    color: black; /* Black text for better contrast on orange */
  }
  .black-box {
    background-color: black;
  }
</style>
</head>
<body>

<div class="outer-box">
  <table>
    <!-- Top Row: Red on left, Green on right -->
    <tr>
      <td class="colored-box red-box">Red</td>
      <td></td>
      <td class="colored-box green-box">Green</td>
    </tr>
    <!-- Middle Row: Blue in the center -->
    <tr>
      <td></td>
      <td class="colored-box blue-box">Blue</td>
      <td></td>
    </tr>
    <!-- Bottom Row: Orange on left, Black on right -->
    <tr>
      <td class="colored-box orange-box">Orange</td>
      <td></td>
      <td class="colored-box black-box">Black</td>
    </tr>
  </table>
</div>

</body>
</html>
