<!DOCTYPE html>
<html>
<head>
<style>
  table {
    border-collapse: collapse;
    width: 250px; /* Adjust width as needed */
    height: 150px; /* Adjust height as needed */
  }
  td {
    border: 2px solid darkblue;
    padding: 15px;
    font-family: sans-serif;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>
<body>

<table>
  <tr>
    <!-- Added red background and white text -->
    <td style="width: 40%; background-color: red; color: white;">Red</td>
    
    <td rowspan="3" style="width: 60%;"></td> 
  </tr>
  <tr>
    <!-- Added green background and white text -->
    <td style="background-color: green; color: white;">Green</td>
  </tr>
  <tr>
    <!-- Added blue background and white text -->
    <td style="background-color: blue; color: white;">Blue</td>
  </tr>
</table>

</body>
</html
