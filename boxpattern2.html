<!DOCTYPE html>
<html>
<head>
<style>
  .outer-box {
    border: 2px solid darkblue;
    width: 400px; /* Made wider to match the drawing */
    height: 200px;
    padding: 10px;
    box-sizing: border-box;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    height: 100%;
  }
  td {
    width: 33.33%;
    height: 33.33%;
    text-align: center;
    font-family: sans-serif;
    font-size: 18px;
    font-weight: bold;
    color: white;
  }
  /* Specific styling for the colored boxes */
  .red-box {
    background-color: red;
    border: 2px solid darkblue;
  }
  .green-box {
    background-color: green;
    border: 2px solid darkblue;
  }
  .blue-box {
    background-color: blue;
    border: 2px solid darkblue;
  }
</style>
</head>
<body>

<div class="outer-box">
  <table>
    <tr>
      <td class="red-box">Red</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td></td>
      <td class="green-box">Green</td>
      <td></td>
    </tr>
    <tr>
      <td></td>
      <td></td>
      <td class="blue-box">Blue</td>
    </tr>
  </table>
</div>

</body>
</html>
